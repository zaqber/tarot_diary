<header class="header">
  <div class="logo">
    <a routerLink="/">
      <img src="assets/images/logo.png" alt="Tarot Diary">
    </a>
  </div>
  <div class="header-content">
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">☰</button>
    <nav>
      <ul class="nav" [class.active]="isMenuOpen">
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/new_spread" routerLinkActive="active">New Spread</a></li>
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/history" routerLinkActive="active">History</a></li>
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/analysis" routerLinkActive="active">Analysis</a></li>
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/reminders" routerLinkActive="active">提醒</a></li>
        <li *ngIf="auth.isLoggedIn()"><a routerLink="/tarot_card_mgmt" routerLinkActive="active">Tarot Card Mgmt</a></li>
        <li *ngIf="auth.isLoggedIn()">
          <span class="user-name">{{ user?.display_name || user?.username }}</span>
          <button type="button" class="btn-logout" (click)="logout()">登出</button>
        </li>
        <li *ngIf="!auth.isLoggedIn()"><a routerLink="/login" class="nav-login">Login</a></li>
      </ul>
    </nav>
  </div>
</header>
