version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tarot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarot_user
      POSTGRES_PASSWORD: tarot_pass
      POSTGRES_DB: tarot_diary
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=zh_TW.UTF-8 --lc-ctype=zh_TW.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarot_user -d tarot_diary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarot-network

  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tarot-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tarot-network:
    driver: bridge
