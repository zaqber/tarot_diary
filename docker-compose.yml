# EC2 / 生產用：PostgreSQL + Redis + 後端與前端從 ECR 拉映像
# AMD64 EC2：docker compose pull && docker compose up -d（映像由 GitHub Actions 建 amd64 推 ECR）
# 1GB 記憶體：已設 memory 上限，若 OOM 可再調低或加 swap

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tarot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarot_user
      POSTGRES_PASSWORD: tarot_pass
      POSTGRES_DB: tarot_diary
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=zh_TW.UTF-8 --lc-ctype=zh_TW.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarot_user -d tarot_diary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 192M

  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 128M

  app:
    image: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/backend:latest
    platform: linux/amd64
    container_name: tarot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Tarot Diary"
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    # 用 volume 掛載 .env，預設為 repo 內；EC2 可設 BACKEND_ENV_PATH=/opt/tarot-diary/backend.env 並把檔案放該處，避免被 git 覆蓋
    volumes:
      - ${BACKEND_ENV_PATH:-./backend/.env}:/var/www/html/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 448M

  # Laravel 排程（reminders:send-telegram 等）：無需在 EC2 設 crontab
  scheduler:
    image: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/backend:latest
    platform: linux/amd64
    container_name: tarot-scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_NAME: "Tarot Diary"
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ${BACKEND_ENV_PATH:-./backend/.env}:/var/www/html/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    image: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/frontend:latest
    platform: linux/amd64
    container_name: tarot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://app:8000
    depends_on:
      - app
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tarot-network:
    driver: bridge
