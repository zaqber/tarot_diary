# EC2 / 生產用：Redis + 後端與前端從 ECR 拉映像，PostgreSQL 使用外部（RDS 或自管）
# AMD64 EC2：docker compose pull && docker compose up -d（映像由 GitHub Actions 建 amd64 推 ECR）
# 1GB 記憶體：已設 memory 上限，若 OOM 可再調低或加 swap

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 128M

  app:
    image: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/backend:latest
    platform: linux/amd64
    container_name: tarot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Tarot Diary"
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/frontend:latest
    platform: linux/amd64
    container_name: tarot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://app:8000
    depends_on:
      - app
    networks:
      - tarot-network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis_data:
    driver: local

networks:
  tarot-network:
    driver: bridge
