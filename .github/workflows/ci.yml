# CI：測試、建置 Docker image、推送到 GitHub Container Registry (ghcr.io)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 推送到 ghcr.io 需要寫入 packages 權限
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/tarot-diary-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/tarot-diary-frontend

jobs:
  # ---------- 後端：PHP 測試 + Docker 建置 ----------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json
          coverage: none

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare .env for test
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --no-interaction

      - name: Run tests
        run: composer test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/backend
          file: ${{ github.workspace }}/backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/backend
          file: ${{ github.workspace }}/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 前端：建置驗證 + Docker 建置 ----------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/frontend
          file: ${{ github.workspace }}/frontend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push frontend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/frontend
          file: ${{ github.workspace }}/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 推送到 AWS ECR（amd64，供 1GB EC2 直接 pull 不需本地 build）----------
  push-ecr:
    name: Build amd64 and push to ECR
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ECR_REGISTRY: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com
      ECR_BACKEND: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/backend
      ECR_FRONTEND: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com/tarot-diary/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Log in to ECR
        id: ecr-login
        run: |
          aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/backend
          file: ${{ github.workspace }}/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_BACKEND }}:latest
            ${{ env.ECR_BACKEND }}:v0.0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/frontend
          file: ${{ github.workspace }}/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_FRONTEND }}:latest
            ${{ env.ECR_FRONTEND }}:v0.0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- CD：部署到 EC2（僅 push to main，且 ECR 推送成功後）----------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [push-ecr]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_REPO_DIR: ${{ secrets.EC2_REPO_DIR }}
          ECR_REGISTRY: 636155394566.dkr.ecr.ap-northeast-1.amazonaws.com
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: EC2_REPO_DIR,ECR_REGISTRY
          script: |
            set -e
            REPO_DIR="${EC2_REPO_DIR:-/home/ubuntu/tarot_diary}"
            cd "$REPO_DIR" && git pull
            # EC2 需有 IAM 角色 ECR 讀取權限，或已設定 AWS CLI，才能 pull 私有映像
            aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            docker compose pull
            docker compose up -d
